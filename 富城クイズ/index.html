  <title>とよシローなにシロークイズ</title>
  </head>
  <body>
    <div style="padding: 1em 1.5em;margin: 2em 0;background-color:#f4f9ff;border:1px solid #84c1ff;box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);color:#000000;">
     <h1><font color="crimson">とよシローなにシロークイズ！！</font></h1>
    </div>
    &ensp;
    <p>このクイズでは様々な格好をしたとよシローが〇〇シローかを考えるクイズだよ！</p>
    &ensp;
    <h2><font color="gold">＜ルール説明＞</font></h2>
    <ul>
      <li>回答は”とよシロー”みたいに<font color="orange">シローはカタカナ、それ以外はひらがな</font>にしてね!</li>
      <li>今回は△なしの〇か✕かで点数をつけるからクレームはやめてね!</li>
    </ul>
    &emsp;
    <h2>例題　<font color="fuchsia">これはなにシロー？</font></h2>
    <p><img src="susiro-.jpg" alt="susiro-" width="300" height="200"></p>
    &nbsp;&nbsp;
    <h2><font color="red">回答　すシロー</font></h2>
    <p>この問題は簡単だったね！すし職人の格好をしたとよシロー、つまり「すシロー」です。<br>
      こんな感じの問題を10問用意したから全問正解目指して頑張ろう!
    </p>
    
  
    <p id="moji"></p>
