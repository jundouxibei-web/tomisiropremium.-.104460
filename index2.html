 <style>.tite {
    margin: 1em 0;
    background: #fff9dc;
    text-align: center;
    color: #FF00FF
}
.tite .box-title {
    font-size: 0.8em;
    background: #ff3300ce;
    padding: 4px;
    text-align: center;
    color: #000000;
    font-weight: bold;
    letter-spacing: 0.05em;
}
.tite p {
    text-align: center;
    padding: 15px 20px;
    margin: 0;
}


.kai {
  display: block;
  margin: 20px auto;
  
}

.input-box:focus {
  border-bottom-color: #ff6f61;
}

.kai {
  width: 70%;
  padding: 20px;
  font-size: 30px;
  border-radius: 20px;
  border-width: 10px;
  align-items: center;
  border-color: blanchedalmond;
  outline: none;
}

.kai:focus {
  background-color: #ffffff;
  box-shadow: 0 0 0 2px #ffb74d;
}
 .btn1 {
      padding: 12px 32px;
      font-size: 18px;
      color: white;
      background-color: #ff6f61;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 
        background-color 0.3s,
        transform 0.2s,
        box-shadow 0.2s;
      display: block;

margin: 40px auto;
    }

    .btn1:hover {
      background-color: #ff3b2f;
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
    }

    .btn1:active {
      transform: translateY(0);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    
.move-out {
  animation: fadeOut 0.6s forwards;
}

.answaku{
    padding: 8px 19px;
    margin: 2em 0;
    color: #2c2c2f;
    background: #cde4ff;
    border-top: solid 5px #5989cf;
    border-bottom: solid 5px #5989cf;
}
.answaku p {
    margin: 0; 
    padding: 0;
}
.ans{
    padding: 0.5em 1em;
    margin: 4em 0;
    background: #f4f4f4;
    border-left: solid 6px #b7665b;
    box-shadow: 0px 2px 3px rgba(0, 0, 0, 0.33);
}
.ans p {
    margin: 0; 
    padding: 0;
}

 .btn11 {
      padding: 12px 32px;

      color: white;
      background-color: #ff6f61;

        background-color 0.3s,

margin: 40px auto;

    .btn11:hover {

      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }



</style>
